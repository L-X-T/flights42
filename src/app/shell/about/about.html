<h1>About</h1>

<app-tabbed-pane #pane>
  <app-tab title="Upcoming Flights">
    <p class="muted" style="text-align: center">No upcoming flights</p>
  </app-tab>
  <app-tab title="Operated Flights">
    <p class="muted" style="text-align: center">No operated flights</p>
  </app-tab>
  <app-tab title="Cancelled Flights">
    <p class="muted" style="text-align: center">No cancelled flights</p>
  </app-tab>
</app-tabbed-pane>

<div class="btn-row" style="margin: 24px 0">
  <button (click)="pane.activate(1)">Activate 2nd tab</button>
  <button
    class="btn-danger"
    (appClickWithWarning)="deleteAll()"
    #cww="clickWithWarning">
    Delete all
  </button>
  <button (click)="showDialog()">Show dialog</button>
</div>

<div class="btn-row" style="margin: 24px 0">
  <button appSimpleTooltip="Click here to book the flight">Book flight</button>
</div>

<div style="margin-bottom: 24px">
  <label for="passenger">Passenger name</label>
  <input
    [appTooltip]="tmpl"
    id="passenger"
    placeholder="Search passenger"
    style="width: 240px" />
</div>
<ng-template #tmpl let-title let-body="text">
  <div class="tooltip">
    <h4>{{ title }}</h4>
    <p>{{ body }}</p>
  </div>
</ng-template>

<app-data-table [data]="flights()">
  <div *appTableField="let data; provide: 'id'; title: 'Flight Id'">
    {{ data }}
  </div>
  <div *appTableField="let data; provide: 'from'; title: 'From'">
    {{ data }}
  </div>
  <div *appTableField="let data; provide: 'to'; title: 'To'">{{ data }}</div>
  <div *appTableField="let data; provide: 'date'; title: 'Departure Date'">
    {{ data | date: 'dd MMM yyyy, HH:mm' }}
  </div>
</app-data-table>
