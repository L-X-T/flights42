@let itemValue = item();
<div class="card">
  <div class="card-body">
    <div class="card-header">
      <div>
        <div class="route">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#999"
            stroke-width="1.5">
            <rect x="4" y="7" width="16" height="13" rx="2" />
            <path d="M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2" />
            <line x1="12" y1="11" x2="12" y2="15" />
          </svg>
          <span class="route-city">Luggage #{{ itemValue.id }}</span>
        </div>
        <p class="muted mono">LUGGAGE-0815-4711-{{ itemValue.id }}</p>
      </div>
      <span
        class="badge"
        [class.badge-success]="
          itemValue.status.toLowerCase() === 'checked in' ||
          itemValue.status.toLowerCase() === 'delivered'
        "
        [class.badge-warning]="itemValue.status.toLowerCase() === 'in transit'">
        {{ itemValue.status }}
      </span>
    </div>
    <div class="cols">
      <div>
        <p class="col-label">Weight</p>
        <p class="col-value">{{ itemValue.weight }} kg</p>
      </div>
      <div>
        <p class="col-label">Destination</p>
        <p class="col-value">{{ itemValue.destination | appCity: 'short' }}</p>
      </div>
    </div>
    <ng-content select=".detail" />
    <div class="btn-row">
      @if (!selected()) {
        <button (click)="select()">Select</button>
      } @else {
        <button (click)="deselect()">Remove</button>
      }
      <ng-content select=".button" />
    </div>
    <p class="muted" style="margin-top: 12px">
      <small>
        <ng-content select=".footer">All rights reserved.</ng-content>
      </small>
    </p>
  </div>
</div>
