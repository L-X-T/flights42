<h1>Passenger search</h1>
<form>
  <div style="display: flex; gap: 16px; margin-bottom: 12px">
    <div style="flex: 1">
      <label for="name">Name</label>
      <input [formField]="filterForm.name" id="name" />
    </div>
    <div style="flex: 1">
      <label for="firstName">First Name</label>
      <input
        [formField]="filterForm.firstName"
        id="firstName"
        placeholder="Optional" />
    </div>
  </div>
  <div class="btn-row" style="margin-bottom: 28px">
    <button type="button" (click)="search()">Search</button>
  </div>
</form>
@if (passengers().length) {
  <p class="muted" style="margin-bottom: 12px">
    {{ passengers().length }} results for "{{ name() }}"
  </p>
}
<div class="card-stack">
  @for (p of passengers(); track p.id) {
    <app-passenger-card
      [item]="p"
      [selected]="selected()[p.id]"
      (selectedChange)="updateSelected(p.id, $event)">
      <button [routerLink]="['../passenger-edit', p.id]">Edit</button>
    </app-passenger-card>
  }
</div>
