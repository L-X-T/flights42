@let itemValue = item();
<div class="card" [class.selected]="selected()">
  <div class="card-body">
    <div class="card-header">
      <div>
        <div class="route">
          <span class="route-city">{{ itemValue.from }}</span>
          <svg width="20" height="12" viewBox="0 0 20 12">
            <path
              d="M0 6h18M14 1l5 5-5 5"
              stroke="#bbb"
              stroke-width="1.5"
              fill="none" />
          </svg>
          <span class="route-city">{{ itemValue.to }}</span>
        </div>
        <p class="muted">Flight #{{ itemValue.id }}</p>
      </div>
      <span
        class="badge"
        [class.badge-success]="!itemValue.delayed"
        [class.badge-warning]="itemValue.delayed">
        {{ itemValue.delayed ? 'Delayed' : 'On time' }}
      </span>
    </div>
    <div class="cols">
      <div>
        <p class="col-label">Date</p>
        <p class="col-value">{{ itemValue.date | date: 'dd MMM yyyy' }}</p>
      </div>
      <div>
        <p class="col-label">Time</p>
        <p class="col-value">{{ itemValue.date | date: 'HH:mm' }}</p>
      </div>
    </div>
    <div class="btn-row">
      @if (!selected()) {
        <button (click)="select()">Select</button>
      } @else {
        <button (click)="deselect()">Remove</button>
      }
      <ng-content />
    </div>
  </div>
</div>
